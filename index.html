<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IUT Thesis Tracker — Research Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0b0d12;
  --bg-1:#11141b;
  --bg-2:#171b24;
  --bg-3:#1f2532;
  --bg-4:#2a3142;
  --line:#252b38;
  --line-bright:#39415a;
  --ink:#e8ecf3;
  --ink-dim:#a8b0c2;
  --ink-mute:#6b7385;
  --accent:#d4a956;        /* warm gold */
  --accent-2:#e9c373;
  --accent-soft:rgba(212,169,86,.12);
  --c-backlog:#6b7385;
  --c-todo:#5b8def;
  --c-progress:#e6a23c;
  --c-review:#a972d4;
  --c-done:#5cb88a;
  --c-red:#e26666;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.5);
  --shadow-lg:0 12px 48px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.6);
  --radius:10px;
  --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Manrope',-apple-system,sans-serif;
  background:var(--bg-0);
  color:var(--ink);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 20% 0%,rgba(212,169,86,.04),transparent 50%),
    radial-gradient(circle at 80% 100%,rgba(91,141,239,.03),transparent 50%);
}
.serif{font-family:'Fraunces',Georgia,serif;font-optical-sizing:auto}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-0)}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:6px;border:2px solid var(--bg-0)}
::-webkit-scrollbar-thumb:hover{background:var(--bg-4)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;width:100%}
.sidebar{
  background:linear-gradient(180deg,var(--bg-1),var(--bg-0));
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-0)}

/* ── SIDEBAR ── */
.brand{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--line);
}
.brand-logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:6px;
}
.brand-mark{
  width:36px;height:36px;
  border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#b8923f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;
  font-weight:700;font-size:20px;
  color:#1a1407;
  box-shadow:0 4px 12px rgba(212,169,86,.3);
}
.brand-text{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:18px;
  letter-spacing:-0.02em;
}
.brand-sub{
  font-size:10.5px;
  color:var(--ink-mute);
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:500;
  margin-top:2px;
}
.nav-section{padding:18px 12px 8px}
.nav-label{
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--ink-mute);
  font-weight:600;
  padding:0 12px 8px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  color:var(--ink-dim);
  font-weight:500;
  transition:all .15s;
  font-size:13.5px;
  position:relative;
}
.nav-item:hover{background:var(--bg-2);color:var(--ink)}
.nav-item.active{
  background:var(--accent-soft);
  color:var(--accent-2);
}
.nav-item.active::before{
  content:'';
  position:absolute;
  left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;
  background:var(--accent);
  border-radius:0 2px 2px 0;
}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.85}

.group-list{flex:1;overflow-y:auto;padding:0 12px 12px}
.group-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 12px;
  border-radius:9px;
  cursor:pointer;
  margin-bottom:2px;
  position:relative;
  transition:all .15s;
}
.group-item:hover{background:var(--bg-2)}
.group-item.active{background:var(--bg-2)}
.group-dot{
  width:10px;height:10px;border-radius:3px;flex-shrink:0;
  box-shadow:0 0 12px currentColor;
}
.group-info{flex:1;min-width:0}
.group-name{
  font-size:12.5px;
  font-weight:600;
  color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.group-meta{
  font-size:10.5px;
  color:var(--ink-mute);
  margin-top:1px;
  display:flex;align-items:center;gap:6px;
}
.group-progress{
  position:absolute;
  bottom:3px;left:34px;right:12px;
  height:2px;
  background:var(--bg-3);
  border-radius:2px;overflow:hidden;
}
.group-progress-fill{
  height:100%;
  background:currentColor;
  transition:width .4s;
}
.group-item.active .group-name{color:var(--accent-2)}

.sidebar-footer{
  padding:12px 16px;
  border-top:1px solid var(--line);
  font-size:10.5px;
  color:var(--ink-mute);
  display:flex;align-items:center;justify-content:space-between;
}

/* ── TOP BAR ── */
.topbar{
  height:64px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 28px;
  gap:20px;
  background:var(--bg-0);
  flex-shrink:0;
}
.page-title{
  font-family:'Fraunces',serif;
  font-size:20px;
  font-weight:600;
  letter-spacing:-0.02em;
  flex-shrink:0;
}
.page-subtitle{
  font-size:11.5px;
  color:var(--ink-mute);
  margin-top:2px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  font-weight:500;
}
.topbar-spacer{flex:1}
.search-box{
  position:relative;
  width:280px;
}
.search-box input{
  width:100%;
  height:38px;
  padding:0 14px 0 38px;
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:9px;
  font-size:13px;
  outline:none;
  transition:all .15s;
}
.search-box input:focus{border-color:var(--accent);background:var(--bg-3)}
.search-box::before{
  content:'';
  position:absolute;
  left:13px;top:50%;
  width:14px;height:14px;
  transform:translateY(-50%);
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8b0c2' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center/contain no-repeat;
}
.btn{
  height:38px;padding:0 16px;
  border-radius:9px;
  font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;
  transition:all .15s;
  white-space:nowrap;
}
.btn-primary{
  background:var(--accent);color:#1a1407;
}
.btn-primary:hover{background:var(--accent-2)}
.btn-ghost{
  background:var(--bg-2);
  border:1px solid var(--line);
  color:var(--ink-dim);
}
.btn-ghost:hover{background:var(--bg-3);color:var(--ink)}

/* ── BOARD ── */
.board-wrap{
  flex:1;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.board-header{
  padding:22px 28px 18px;
  border-bottom:1px solid var(--line);
}
.board-title-row{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:24px;
  margin-bottom:14px;
}
.board-title-block{flex:1;min-width:0}
.board-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:5px;
  font-size:10.5px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:8px;
}
.board-title{
  font-family:'Fraunces',serif;
  font-size:24px;
  font-weight:600;
  letter-spacing:-0.02em;
  line-height:1.25;
  color:var(--ink);
  margin-bottom:6px;
}
.board-meta{
  font-size:12.5px;
  color:var(--ink-mute);
  display:flex;flex-wrap:wrap;gap:14px;align-items:center;
}
.board-meta-item{display:flex;align-items:center;gap:6px}
.avatar-stack{display:flex}
.avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--bg-3),var(--bg-4));
  border:2px solid var(--bg-0);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink);
  margin-left:-6px;
}
.avatar:first-child{margin-left:0}

.board-stats{
  display:flex;gap:14px;
  flex-wrap:wrap;
}
.stat-pill{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 14px;
  min-width:96px;
}
.stat-pill-label{
  font-size:10px;
  color:var(--ink-mute);
  text-transform:uppercase;
  letter-spacing:0.1em;
  font-weight:600;
  margin-bottom:2px;
}
.stat-pill-value{
  font-family:'Fraunces',serif;
  font-size:20px;
  font-weight:600;
  letter-spacing:-0.01em;
}
.stat-pill-value.acc{color:var(--accent-2)}
.stat-pill-value.green{color:var(--c-done)}
.stat-pill-value.red{color:var(--c-red)}
.stat-pill-value.blue{color:var(--c-todo)}

.board-body{
  flex:1;
  overflow:auto;
  padding:18px 28px 28px;
}
.kanban{
  display:flex;
  gap:14px;
  height:100%;
  min-width:fit-content;
}
.column{
  width:288px;
  flex-shrink:0;
  background:var(--bg-1);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  display:flex;flex-direction:column;
  max-height:100%;
}
.column.drag-over{
  background:var(--bg-2);
  border-color:var(--accent);
}
.column-head{
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);
}
.column-title{
  display:flex;align-items:center;gap:8px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
}
.column-dot{
  width:8px;height:8px;border-radius:50%;
}
.column-count{
  background:var(--bg-3);
  color:var(--ink-dim);
  font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:11px;
  font-family:'JetBrains Mono',monospace;
}
.column-add{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-mute);
  transition:all .15s;
}
.column-add:hover{background:var(--bg-3);color:var(--accent-2)}
.column-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;flex-direction:column;gap:8px;
  min-height:50px;
}
.column-empty{
  padding:24px 12px;
  text-align:center;
  font-size:12px;
  color:var(--ink-mute);
  border:1px dashed var(--line);
  border-radius:8px;
  font-style:italic;
}

/* ── CARD ── */
.card{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:11px 12px;
  cursor:grab;
  transition:all .15s;
  position:relative;
  user-select:none;
}
.card:hover{
  background:var(--bg-3);
  border-color:var(--line-bright);
  transform:translateY(-1px);
  box-shadow:var(--shadow-md);
}
.card.dragging{opacity:.4;cursor:grabbing}
.card-priority-bar{
  position:absolute;
  left:0;top:8px;bottom:8px;
  width:3px;border-radius:0 2px 2px 0;
}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.card-tag{
  font-size:9.5px;font-weight:700;
  padding:2px 7px;border-radius:4px;
  letter-spacing:0.06em;text-transform:uppercase;
}
.card-title{
  font-size:13px;
  font-weight:500;
  line-height:1.4;
  margin-bottom:8px;
  color:var(--ink);
  word-break:break-word;
}
.card-progress{
  height:4px;background:var(--bg-4);border-radius:2px;
  overflow:hidden;margin-bottom:8px;
}
.card-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  border-radius:2px;
  transition:width .4s;
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.card-meta-icons{
  display:flex;align-items:center;gap:10px;
  font-size:11px;
  color:var(--ink-mute);
}
.card-meta-icons span{display:inline-flex;align-items:center;gap:4px}
.card-meta-icons .overdue{color:var(--c-red);font-weight:600}
.card-assignee{
  width:22px;height:22px;border-radius:50%;
  font-size:9.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);
  z-index:100;
  display:none;
  align-items:flex-start;justify-content:center;
  padding:48px 20px;
  overflow-y:auto;
}
.modal-backdrop.show{display:flex}
.modal{
  background:var(--bg-1);
  border:1px solid var(--line-bright);
  border-radius:14px;
  width:100%;max-width:680px;
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  animation:slideIn .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{
  padding:20px 24px 14px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:16px;
}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.modal-title-input{
  font-family:'Fraunces',serif;
  font-size:21px;
  font-weight:600;
  background:transparent;
  border:none;
  width:100%;
  outline:none;
  color:var(--ink);
  letter-spacing:-0.01em;
  resize:none;
  line-height:1.3;
}
.modal-title-input:focus{
  background:var(--bg-2);
  padding:6px 10px;
  margin:-6px -10px;
  border-radius:6px;
}
.modal-close{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-mute);
  background:var(--bg-2);
  flex-shrink:0;
}
.modal-close:hover{background:var(--bg-3);color:var(--ink)}
.modal-body{
  padding:18px 24px 24px;
  display:grid;
  grid-template-columns:1fr 200px;
  gap:24px;
}
.modal-section{margin-bottom:18px}
.modal-section-label{
  font-size:10px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--ink-mute);
  margin-bottom:7px;
}
.modal-input,.modal-textarea,.modal-select{
  width:100%;
  background:var(--bg-2);
  border:1px solid var(--line);
  color:var(--ink);
  border-radius:8px;
  padding:9px 12px;
  font-size:13px;
  outline:none;
  transition:all .15s;
}
.modal-input:focus,.modal-textarea:focus,.modal-select:focus{
  border-color:var(--accent);
  background:var(--bg-3);
}
.modal-textarea{resize:vertical;min-height:78px;font-family:inherit;line-height:1.5}
.modal-progress{
  display:flex;align-items:center;gap:10px;
}
.modal-progress input[type=range]{
  flex:1;
  -webkit-appearance:none;
  height:6px;border-radius:3px;
  background:var(--bg-3);
  outline:none;
}
.modal-progress input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);
  cursor:pointer;
  box-shadow:0 0 0 3px var(--bg-1),0 2px 6px rgba(0,0,0,.3);
}
.modal-progress-val{
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  color:var(--accent-2);
  font-size:13px;
  min-width:42px;text-align:right;
}

.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.checklist-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:7px;
  padding:7px 10px;
}
.checklist-check{
  width:16px;height:16px;border-radius:4px;
  border:1.5px solid var(--ink-mute);
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  transition:all .15s;
}
.checklist-check.done{background:var(--c-done);border-color:var(--c-done)}
.checklist-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.checklist-text{
  flex:1;font-size:12.5px;color:var(--ink);
  background:transparent;border:none;outline:none;
}
.checklist-item.done .checklist-text{text-decoration:line-through;color:var(--ink-mute)}
.checklist-del{
  color:var(--ink-mute);font-size:14px;
  width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
}
.checklist-del:hover{background:var(--bg-4);color:var(--c-red)}
.checklist-add{
  display:flex;gap:6px;
}
.checklist-add input{
  flex:1;
  background:var(--bg-2);
  border:1px dashed var(--line-bright);
  border-radius:7px;
  padding:7px 10px;
  font-size:12.5px;outline:none;
}
.checklist-add input:focus{border-color:var(--accent);border-style:solid}

.comments{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.comment{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;
}
.comment-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.comment-author{font-size:11px;font-weight:600;color:var(--accent-2)}
.comment-time{font-size:10px;color:var(--ink-mute);font-family:'JetBrains Mono',monospace}
.comment-text{font-size:12.5px;color:var(--ink-dim);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.comment-add{
  display:flex;flex-direction:column;gap:6px;
}
.comment-add textarea{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:9px 12px;
  font-size:12.5px;
  outline:none;resize:vertical;min-height:60px;
  font-family:inherit;
}
.comment-add textarea:focus{border-color:var(--accent)}
.comment-add-btn{
  align-self:flex-end;
  padding:6px 14px;
  background:var(--accent);
  color:#1a1407;
  border-radius:7px;
  font-size:11.5px;font-weight:700;
}

.modal-foot{
  padding:14px 24px;
  border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-0);
}
.btn-danger{
  background:transparent;
  color:var(--c-red);
  border:1px solid var(--bg-3);
  padding:7px 14px;
  border-radius:8px;
  font-size:12px;font-weight:600;
}
.btn-danger:hover{background:rgba(226,102,102,.1);border-color:var(--c-red)}

/* ── OVERVIEW ── */
.overview{
  flex:1;overflow-y:auto;
  padding:28px;
}
.overview-hero{
  background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
  border:1px solid var(--line);
  border-radius:16px;
  padding:30px 32px;
  margin-bottom:24px;
  position:relative;overflow:hidden;
}
.overview-hero::before{
  content:'';
  position:absolute;
  top:-50%;right:-10%;
  width:400px;height:400px;
  background:radial-gradient(circle,var(--accent-soft),transparent 70%);
  pointer-events:none;

let state = {

};
let currentCardId = null;

// Storage helpers
async function storageGet(key){
  try{
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function storageSet(key, val){
  try{
    await window.storage.set(key, JSON.stringify(val));
    return true;
  }catch(e){
    return false;
  }
}

function uid(){ return 'c_'+Math.random().toString(36).slice(2,11); }

async function loadState(){
  const saved = await storageGet('thesis_tracker:cards');
  if(saved && Object.keys(saved).length){
    state.cards = saved;
  }else{
    seedDefaults();
    await persist();
  }
}

function seedDefaults(){
  const cards = {};
  GROUPS.forEach(g=>{
    const tasks = SEED_TASKS[g.id] || [];
    tasks.forEach((t,idx)=>{
      const id = uid();
      const dueDays = 7 + idx*5 + Math.floor(Math.random()*10);
      const due = new Date(Date.now()+dueDays*86400000);
      cards[id] = {
        id, groupId:g.id,
        title:t.title,
        description:'',
        col:t.col,
        priority:t.priority,
        progress:t.progress,
        tags:t.tags || [],
        assignee:g.students[idx % g.students.length].name,
        dueDate:due.toISOString().slice(0,10),
        checklist:[],
        comments:[],
        createdAt:Date.now(),
        updatedAt:Date.now(),
        order:idx,
      };
    });
  });
  state.cards = cards;
}

async function persist(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async ()=>{
    const ok = await storageSet('thesis_tracker:cards', state.cards);
    if(ok) showToast('Saved');
  },150);
}

// ───────────────────────────────────────────────────────────────────────────
// HELPERS
// ───────────────────────────────────────────────────────────────────────────
function getCardsForGroup(gid){
  return Object.values(state.cards).filter(c=>c.groupId===gid);
}
function getAllCards(){ return Object.values(state.cards); }
function getGroup(gid){ return GROUPS.find(g=>g.id===gid); }
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function isOverdue(iso, col){
  if(!iso || col==='done') return false;
  return new Date(iso) < new Date(new Date().toDateString());
}
function initials(name){
  return name.split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
}
function colorForName(name){
  // deterministic pastel
  let h = 0;
  for(let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
  const hue = h%360;
  return `hsl(${hue} 40% 45%)`;
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg='Saved'){
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 1600);
}

function statsForGroup(gid){
  const cards = getCardsForGroup(gid);
  const total = cards.length;
  const done = cards.filter(c=>c.col==='done').length;
  const inProgress = cards.filter(c=>c.col==='progress').length;
  const overdue = cards.filter(c=>isOverdue(c.dueDate, c.col)).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const avgProgress = total ? Math.round(cards.reduce((s,c)=>s+c.progress,0)/total) : 0;
  return {total,done,inProgress,overdue,pct,avgProgress};
}

                  ${g.students.slice(0,4).map(st=>`
                    <div class="avatar" title="${escapeHtml(st.name)}" style="background:${colorForName(st.name)}">${initials(st.name)}</div>
                  `).join('')}
                </div>
                <span style="font-size:11.5px;color:var(--ink-mute)">${g.students.length} researcher${g.students.length>1?'s':''}</span>
              </div>
              <div class="group-card-progress">
                <div class="group-card-progress-fill" style="width:${s.pct}%;background:${g.color}"></div>
              </div>
              <div class="group-card-stats">
                <span><strong>${s.total}</strong>tasks</span>
                <span><strong>${s.done}</strong>done</span>
                <span><strong>${s.inProgress}</strong>active</span>
                <span style="color:${s.overdue?'var(--c-red)':'var(--ink-mute)'}"><strong>${s.overdue}</strong>overdue</span>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ───────────────────────────────────────────────────────────────────────────
// RENDER : KANBAN BOARD
// ───────────────────────────────────────────────────────────────────────────

            <div class="board-meta">
              <div class="board-meta-item">

            </div>
            <div class="stat-pill">
              <div class="stat-pill-label">Total</div>
              <div class="stat-pill-value">${s.total}</div>
            </div>
            <div class="stat-pill">
              <div class="stat-pill-label">Active</div>
              <div class="stat-pill-value blue">${s.inProgress}</div>
            </div>
            <div class="stat-pill">
              <div class="stat-pill-label">Done</div>

          <button class="filter-pill ${state.filterPriority===null?'active':''}" onclick="setFilter('priority',null)">All Priority</button>

function renderColumn(col, allCards, gid){
  const cards = allCards.filter(c=>c.col===col.id).filter(passesFilters).sort((a,b)=>(a.order||0)-(b.order||0));
  return `
    <div class="column" data-col="${col.id}" data-gid="${gid}">
      <div class="column-head">
        <div class="column-title">
          <span class="column-dot" style="background:${col.color}"></span>
          ${col.label}
          <span class="column-count">${cards.length}</span>
        </div>
        <button class="column-add" onclick="addCard('${col.id}',${gid})" title="Add task">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="column-body" data-col-body="${col.id}">
        ${cards.length ? cards.map(renderCard).join('') : `<div class="column-empty">No tasks yet</div>`}
      </div>
    </div>`;
}

function renderCard(c){
  const g = getGroup(c.groupId);
  const overdue = isOverdue(c.dueDate, c.col);
  const checklistDone = c.checklist.filter(i=>i.done).length;
  const priorityColor = PRIORITY_COLORS[c.priority] || 'transparent';
  return `
    <div class="card" draggable="true" data-id="${c.id}" onclick="openCard('${c.id}')">
      <div class="card-priority-bar" style="background:${priorityColor}"></div>
      <div class="card-tags">
        <span class="card-tag" style="background:${g.accent};color:${g.color}">G${g.id}</span>
        ${c.tags.map(t=>`<span class="card-tag" style="background:var(--bg-3);color:var(--ink-dim)">${escapeHtml(t)}</span>`).join('')}
      </div>
      <div class="card-title">${escapeHtml(c.title)}</div>
      ${c.progress>0 ? `<div class="card-progress"><div class="card-progress-fill" style="width:${c.progress}%"></div></div>` : ''}
      <div class="card-footer">
        <div class="card-meta-icons">
          ${c.dueDate ? `<span class="${overdue?'overdue':''}">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${fmtDate(c.dueDate)}
          </span>` : ''}
          ${c.checklist.length ? `<span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            ${checklistDone}/${c.checklist.length}
          </span>`:''}
          ${c.comments.length ? `<span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${c.comments.length}
          </span>`:''}
        </div>
        ${c.assignee ? `<div class="card-assignee" title="${escapeHtml(c.assignee)}" style="background:${colorForName(c.assignee)}">${initials(c.assignee)}</div>` : ''}
      </div>
    </div>`;
}

function passesFilters(c){
  if(state.filterPriority && c.priority !== state.filterPriority) return false;
  if(state.filterAssignee && c.assignee !== state.filterAssignee) return false;
  if(state.searchTerm){
    const t = state.searchTerm.toLowerCase();
    const hay = (c.title+' '+(c.description||'')+' '+(c.assignee||'')+' '+(c.tags||[]).join(' ')).toLowerCase();
    if(!hay.includes(t)) return false;
  }
  return true;
}

// ───────────────────────────────────────────────────────────────────────────
// RENDER : ALL TASKS
// ───────────────────────────────────────────────────────────────────────────
function renderAllTasks(){
  document.getElementById('pageTitle').textContent = 'All Tasks';
  document.getElementById('pageSub').textContent = 'Master task list — every group, every assignee';

  const cards = getAllCards().filter(passesFilters)
    .sort((a,b)=>{
      // overdue first, then by status order, then due date
      const ov = (isOverdue(b.dueDate,b.col)?1:0) - (isOverdue(a.dueDate,a.col)?1:0);
      if(ov) return ov;
      const colOrder = ['progress','review','todo','backlog','done'];
      return colOrder.indexOf(a.col) - colOrder.indexOf(b.col);
    });

  const html = `
    <div class="overview">
      <div class="section-head">
        <div class="section-title">Master Task Register</div>
        <div class="section-meta">${cards.length} task${cards.length!==1?'s':''} shown</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;max-width:980px">
        ${cards.length ? cards.map(c=>{
          const g = getGroup(c.groupId);
          const col = COLUMNS.find(co=>co.id===c.col);
          const overdue = isOverdue(c.dueDate, c.col);
          return `
            <div class="card" style="cursor:pointer;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto auto auto auto;gap:14px;align-items:center" onclick="openCard('${c.id}')">
              <div style="width:8px;height:32px;border-radius:3px;background:${g.color}"></div>
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                  <span class="card-tag" style="background:${g.accent};color:${g.color}">G${g.id}</span>
                  <span class="card-tag" style="background:var(--bg-3);color:${col.color}">${col.label}</span>
                  ${c.priority?`<span class="card-tag" style="background:var(--bg-3);color:${PRIORITY_COLORS[c.priority]}">${c.priority}</span>`:''}
                </div>
                <div style="font-size:13.5px;font-weight:500">${escapeHtml(c.title)}</div>
              </div>
              <div style="font-size:11.5px;color:var(--ink-mute);text-align:right;min-width:90px">
                <div class="${overdue?'':''}" style="color:${overdue?'var(--c-red)':'var(--ink-mute)'}">${c.dueDate?fmtDate(c.dueDate):'—'}</div>
              </div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-2);font-weight:600;min-width:42px;text-align:right">${c.progress}%</div>
              <div style="width:80px;height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden">
                <div style="width:${c.progress}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2))"></div>
              </div>
              <div class="card-assignee" title="${escapeHtml(c.assignee||'')}" style="background:${colorForName(c.assignee||'')}">${initials(c.assignee||'?')}</div>
            </div>`;
        }).join('') : `<div class="empty-state"><div class="empty-state-title">No tasks match your filters.</div></div>`}
      </div>
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ───────────────────────────────────────────────────────────────────────────
// MODAL
// ───────────────────────────────────────────────────────────────────────────
function openCard(id){
  currentCardId = id;
  const c = state.cards[id];
  if(!c) return;
  const g = getGroup(c.groupId);

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-head">
      <div style="flex:1">
        <div class="modal-tags">
          <span class="card-tag" style="background:${g.accent};color:${g.color}">Group ${g.id}</span>
          ${c.tags.map(t=>`<span class="card-tag" style="background:var(--bg-3);color:var(--ink-dim)">${escapeHtml(t)}</span>`).join('')}
          <button class="card-tag" style="background:transparent;border:1px dashed var(--line-bright);color:var(--ink-mute);cursor:pointer" onclick="addTag()">+ tag</button>
        </div>
        <textarea id="m-title" class="modal-title-input" rows="2" oninput="updateField('title',this.value)" placeholder="Task title…">${escapeHtml(c.title)}</textarea>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <div>
        <div class="modal-section">
          <div class="modal-section-label">Description</div>
          <textarea class="modal-textarea" placeholder="Add notes, context, or research details…" oninput="updateField('description',this.value)">${escapeHtml(c.description)}</textarea>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Progress · ${c.progress}%</div>
          <div class="modal-progress">
            <input type="range" min="0" max="100" step="5" value="${c.progress}" oninput="updateProgress(this.value)" />
            <span class="modal-progress-val" id="progVal">${c.progress}%</span>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Checklist (${c.checklist.filter(i=>i.done).length}/${c.checklist.length})</div>
          <div class="checklist" id="checklist">
            ${c.checklist.map((it,i)=>`
              <div class="checklist-item ${it.done?'done':''}">
                <button class="checklist-check ${it.done?'done':''}" onclick="toggleCheck(${i})"></button>
                <input class="checklist-text" value="${escapeHtml(it.text)}" oninput="editCheck(${i},this.value)" />
                <button class="checklist-del" onclick="delCheck(${i})" title="Delete">×</button>
              </div>
            `).join('')}
          </div>
          <div class="checklist-add">
            <input id="newCheck" placeholder="Add a checklist item…" onkeydown="if(event.key==='Enter')addCheck()" />
            <button class="btn btn-ghost" style="height:34px;padding:0 12px;font-size:11.5px" onclick="addCheck()">Add</button>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Comments (${c.comments.length})</div>
          <div class="comments">
            ${c.comments.map((cm,i)=>`
              <div class="comment">
                <div class="comment-head">
                  <span class="comment-author">${escapeHtml(cm.author)}</span>
                  <span class="comment-time">${new Date(cm.at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})} · <span style="cursor:pointer;color:var(--c-red)" onclick="delComment(${i})">delete</span></span>
                </div>
                <div class="comment-text">${escapeHtml(cm.text)}</div>
              </div>
            `).join('')}
          </div>
          <div class="comment-add">
            <textarea id="newComment" placeholder="Leave a comment for the group…"></textarea>
            <button class="comment-add-btn" onclick="addComment()">Post Comment</button>
          </div>
        </div>
      </div>

      <div>
        <div class="modal-section">
          <div class="modal-section-label">Status</div>
          <select class="modal-select" onchange="updateField('col',this.value)">
            ${COLUMNS.map(co=>`<option value="${co.id}" ${co.id===c.col?'selected':''}>${co.label}</option>`).join('')}
          </select>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Priority</div>
          <select class="modal-select" onchange="updateField('priority',this.value)">
            ${['High','Medium','Low'].map(p=>`<option value="${p}" ${p===c.priority?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Assigned To</div>
          <select class="modal-select" onchange="updateField('assignee',this.value)">
            <option value="">Unassigned</option>
            ${g.students.map(s=>`<option value="${escapeHtml(s.name)}" ${s.name===c.assignee?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}
          </select>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Due Date</div>
          <input type="date" class="modal-input" value="${c.dueDate||''}" onchange="updateField('dueDate',this.value)" />
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Created</div>
          <div style="font-size:11.5px;color:var(--ink-mute);font-family:'JetBrains Mono',monospace">${new Date(c.createdAt).toLocaleDateString()}</div>

    <div class="modal-foot">
      <button class="btn-danger" onclick="deleteCard()">Delete Task</button>

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  currentCardId = null;
  rerender();
}

async function updateField(field, val){
  const c = state.cards[currentCardId];
  if(!c) return;
  c[field] = val;
  c.updatedAt = Date.now();
  await persist();
}

async function updateProgress(val){
  const c = state.cards[currentCardId];
  c.progress = parseInt(val,10);
  c.updatedAt = Date.now();
  document.getElementById('progVal').textContent = c.progress+'%';
  await persist();
}

async function addCheck(){
  const inp = document.getElementById('newCheck');
  if(!inp.value.trim()) return;
  const c = state.cards[currentCardId];
  c.checklist.push({text:inp.value.trim(),done:false});
  c.updatedAt = Date.now();
  inp.value='';
  await persist();
  openCard(currentCardId);
}

async function toggleCheck(i){
  const c = state.cards[currentCardId];
  c.checklist[i].done = !c.checklist[i].done;
  c.updatedAt = Date.now();
  await persist();
  openCard(currentCardId);
}

async function editCheck(i,val){
  const c = state.cards[currentCardId];
  c.checklist[i].text = val;
  await persist();
}

async function delCheck(i){
  const c = state.cards[currentCardId];
  c.checklist.splice(i,1);
  await persist();
  openCard(currentCardId);
}

async function addComment(){
  const ta = document.getElementById('newComment');
  if(!ta.value.trim()) return;
  const c = state.cards[currentCardId];
  c.comments.push({author:c.assignee||'Anonymous', text:ta.value.trim(), at:Date.now()});
  c.updatedAt = Date.now();
  await persist();
  openCard(currentCardId);
}

async function delComment(i){
  const c = state.cards[currentCardId];
  c.comments.splice(i,1);
  await persist();
  openCard(currentCardId);
}

async function addTag(){
  const t = prompt('New tag:');
  if(!t) return;
  const c = state.cards[currentCardId];
  if(!c.tags.includes(t)) c.tags.push(t);
  await persist();
  openCard(currentCardId);
}

async function deleteCard(){
  if(!confirm('Delete this task?')) return;
  delete state.cards[currentCardId];
  await persist();
  closeModal();
}

// ───────────────────────────────────────────────────────────────────────────
// CARD CREATION
// ───────────────────────────────────────────────────────────────────────────
async function addCard(col, gid){
  const title = prompt('Task title:');
  if(!title || !title.trim()) return;
  const g = getGroup(gid);
  const id = uid();
  state.cards[id] = {
    id, groupId:gid,
    title:title.trim(),
    description:'',
    col,
    priority:'Medium',
    progress:0,
    tags:[],
    assignee:g.students[0].name,
    dueDate:'',
    checklist:[],
    comments:[],
    createdAt:Date.now(),
    updatedAt:Date.now(),
    order:Date.now(),
  };
  await persist();
  rerender();
  setTimeout(()=>openCard(id), 100);
}

function quickAddTask(){
  let gid;
  if(state.view.startsWith('group:')){
    gid = parseInt(state.view.split(':')[1]);
  }else{
    const choice = prompt('Which group? Enter 1–7:');
    gid = parseInt(choice);
    if(!gid || gid<1 || gid>7){ alert('Pick a number 1–7'); return; }
  }
  addCard('todo', gid);
}

// ───────────────────────────────────────────────────────────────────────────
// DRAG & DROP
// ───────────────────────────────────────────────────────────────────────────
function attachDnD(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', e=>{
      card.classList.remove('dragging');
    });
  });
  document.querySelectorAll('.column').forEach(col=>{
    col.addEventListener('dragover', e=>{
      e.preventDefault();
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', e=>{
      col.classList.remove('drag-over');
    });
    col.addEventListener('drop', async e=>{
      e.preventDefault();
      col.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const newCol = col.dataset.col;
      const c = state.cards[id];
      if(c && c.col !== newCol){
        c.col = newCol;
        if(newCol==='done') c.progress = 100;
        c.updatedAt = Date.now();
        await persist();
        rerender();
      }
    });
  });
}

// ───────────────────────────────────────────────────────────────────────────
// CONTROLLERS
// ───────────────────────────────────────────────────────────────────────────
function setView(v){
  state.view = v;
  state.searchTerm = '';
  document.getElementById('searchInput').value = '';
  rerender();
}

function setFilter(kind, val){
  if(kind==='priority') state.filterPriority = val;
  if(kind==='assignee') state.filterAssignee = val;
  rerender();
}

function onSearch(){
  state.searchTerm = document.getElementById('searchInput').value.trim();
  rerender();
}

function rerender(){
  renderSidebar();
  if(state.view==='overview') renderOverview();
  else if(state.view==='all-tasks') renderAllTasks();
  else if(state.view.startsWith('group:')){
    const gid = parseInt(state.view.split(':')[1]);
    renderBoard(gid);
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(state.cards, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `thesis-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported');
}

// Esc to close
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
});

// ───────────────────────────────────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────────────────────────────────
(async ()=>{
  await loadState();
  rerender();
})();
</script>
